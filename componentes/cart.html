<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header">
        <h5><i class="fas fa-shopping-cart"></i> Mi carrito</h5>
        <button id="closeCartBtn" class="close-cart" style="background:none; border:none; font-size:1.5rem;">&times;</button>
    </div>
    <div id="cartItemsList" class="cart-items">Carrito vacío</div>
    <div class="cart-footer">
        <div class="cart-total">Total: <span id="cartTotalAmount">$0</span></div>
        <button id="checkoutBtn" class="btn-checkout">Proceder al pago</button>
    </div>
</div>
<div id="toastMsg" class="toast-notification">Producto agregado</div>
